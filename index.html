  { id: "m8a", title: "準備", ch: [
    { id: "s8a1", t: "ワンページャーv1修正", d: 13, dn: false, sub: [] },
    { id: "s8a2", t: "会社名・サービス名確定", d: 13, dn: false, sub: [] },
    { id: "s8a3", t: "アドバイザー情報追加", d: 17, dn: false, sub: [] },
    { id: "s8a4", t: "プロ撮影の顔写真用意", d: 22, dn: false, sub: [] },
  ] },
] },
{ id: "b9", q: "q2", title: "コンテンツマーケ", ch: [
  { id: "m9a", title: "note・広告", ch: [
    { id: "s9a1", t: "note記事1本目", d: 17, dn: false, sub: [] },
    { id: "s9a2", t: "Google広告用LP作成", d: 20, dn: false, sub: [] },

  { id: "m9b", title: "オフライン", ch: [

] },
{ id: "b10", q: "q2", title: "アクシス株式会社（5月末ローンチ候補）", ch: [
  { id: "m10a", title: "プロダクト構想", ch: [

    { id: "s10a2", t: "感情ノイズ可視化AI技術調査", d: 26, dn: false, sub: [] },
    { id: "s10a3", t: "企業研修自動化ソフト設計", d: 28, dn: false, sub: [] },

] },
{ id: "b11", q: "q3", title: "事務・手続き", ch: [
  { id: "m11a", title: "片付ける", ch: [

] },
{ id: "b12", q: "q4", title: "ナレッジ整理", ch: [

    { id: "s12a2", t: "ライティングスタイルナレッジ設定", d: 0, dn: true, sub: [] },
  ] },
] },
]; }

let _c = 9000;
function gid() { return "x" + Date.now() + "_" + (_c++); }
function getSmalls(T) { const o = []; for (const b of T) for (const m of (b.ch || [])) for (const s of (m.ch || [])) o.push({ ...s, bId: b.id, bTitle: b.title, q: b.q }); return o; }

// Deep updater for sub-tasks inside small tasks
function updateSmall(tasks, bId, mId, sId, fn) {
  return tasks.map(b => b.id === bId ? { ...b, ch: b.ch.map(m => m.id === mId ? { ...m, ch: m.ch.map(s => s.id === sId ? fn(s) : s) } : m) } : b);
}

function App() {
  const [tasks, setTasks] = useState(() => makeInit());
  const [view, setView] = useState("daily");
  const [selDay, setSelDay] = useState(1);
  const [editId, setEditId] = useState(null);
  const editRef = useRef(null);
  const [addTarget, setAddTarget] = useState(null);
  const addRef = useRef(null);
  const [addDay, setAddDay] = useState(1);
  const [addQ, setAddQ] = useState("q1");
  const [expanded, setExpanded] = useState({});


  useEffect(() => { try { const s = localStorage.getItem("tf13"); if (s) setTasks(JSON.parse(s)); } catch (e) {} }, []);
  function save(n) { setTasks(n); try { localStorage.setItem("tf13", JSON.stringify(n)); } catch (e) {} }
  function doReset() { if (confirm("全タスクを初期状態に戻す？")) { save(makeInit()); setExpanded({}); } }


  const allS = getSmalls(tasks), tot = allS.length, dn = allS.filter(s => s.dn).length;

  function tgl(bI, mI, sI) { save(tasks.map(b => b.id === bI ? { ...b, ch: b.ch.map(m => m.id === mI ? { ...m, ch: m.ch.map(s => s.id === sI ? { ...s, dn: !s.dn } : s) } : m) } : b)); }
  const [editInit, setEditInit] = useState("");
  function se(id, v) { setEditId(id); setEditInit(v); }
  function ce() { const v = editRef.current?.value?.trim(); if (!editId || !v) { setEditId(null); return; } save(tasks.map(b => { if (b.id === editId) return { ...b, title: v }; return { ...b, ch: (b.ch || []).map(m => { if (m.id === editId) return { ...m, title: v }; return { ...m, ch: (m.ch || []).map(s => s.id === editId ? { ...s, t: v } : s) }; }) }; })); setEditId(null); }
  function di(id) { save(tasks.filter(b => b.id !== id).map(b => ({ ...b, ch: (b.ch || []).filter(m => m.id !== id).map(m => ({ ...m, ch: (m.ch || []).filter(s => s.id !== id) })) }))); }
  function addBig() { const v = addRef.current?.value?.trim(); if (!v) return; save([...tasks, { id: gid(), q: addQ, title: v, ch: [] }]); setAddTarget(null); }
  function addMid(bI) { const v = addRef.current?.value?.trim(); if (!v) return; save(tasks.map(b => b.id === bI ? { ...b, ch: [...b.ch, { id: gid(), title: v, ch: [] }] } : b)); setAddTarget(null); }
  function addSmall(bI, mI) { const v = addRef.current?.value?.trim(); if (!v) return; save(tasks.map(b => b.id === bI ? { ...b, ch: b.ch.map(m => m.id === mI ? { ...m, ch: [...m.ch, { id: gid(), t: v, d: addDay, dn: false, sub: [] }] } : m) } : b)); setAddDay(1); setAddTarget(null); }
  function chd(bI, mI, sI, nd) { save(tasks.map(b => b.id === bI ? { ...b, ch: b.ch.map(m => m.id === mI ? { ...m, ch: m.ch.map(s => s.id === sI ? { ...s, d: nd } : s) } : m) } : b)); }

  // Sub-task (short task) functions
  function addSub(bI, mI, sI) {
    const v = addRef.current?.value?.trim(); if (!v) return;
    save(updateSmall(tasks, bI, mI, sI, s => ({ ...s, sub: [...(s.sub || []), { id: gid(), t: v, dn: false }] })));
    setAddTarget(null);
  }
  function tglSub(bI, mI, sI, subId) {
    save(updateSmall(tasks, bI, mI, sI, s => ({ ...s, sub: (s.sub || []).map(x => x.id === subId ? { ...x, dn: !x.dn } : x) })));
  }
  function delSub(bI, mI, sI, subId) {
    save(updateSmall(tasks, bI, mI, sI, s => ({ ...s, sub: (s.sub || []).filter(x => x.id !== subId) })));
  }
  function editSub(bI, mI, sI, subId) {
    const v = editRef.current?.value?.trim(); if (!v) return;
    save(updateSmall(tasks, bI, mI, sI, s => ({ ...s, sub: (s.sub || []).map(x => x.id === subId ? { ...x, t: v } : x) })));
  }

  function toggleExpand(id) { setExpanded(p => ({ ...p, [id]: !p[id] })); }

  // === Small task row with expandable sub-tasks ===
  function renderSR({ s, bI, mI, cx }) {
    const ie = editId === s.id;
    const qd = QS[tasks.find(b => b.id === bI)?.q];
    const hasSub = (s.sub || []).length > 0;
    const isOpen = expanded[s.id];
    const subDone = (s.sub || []).filter(x => x.dn).length;
    const subTotal = (s.sub || []).length;

    return (
      <div>
        <div className="group flex items-start gap-2 py-1.5 px-2 rounded-lg hover:bg-gray-50">
          <button onClick={() => tgl(bI, mI, s.id)} className="mt-0.5 flex-shrink-0">
            <div className={"w-4 h-4 rounded border-2 flex items-center justify-center " + (s.dn ? "bg-green-500 border-green-500" : "border-gray-300")}>
              {s.dn && <svg width="10" height="10" viewBox="0 0 10 10"><path d="M2 5L4 7L8 3" stroke="#fff" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" fill="none" /></svg>}
            </div>
          </button>
          <div className="flex-1 min-w-0">
            <div className="flex items-center gap-1.5">
              {(hasSub || true) && (
                <button onClick={() => toggleExpand(s.id)} className="text-gray-400 hover:text-gray-600 flex-shrink-0" style={{ fontSize: 10 }}>
                  {isOpen ? "▼" : "▶"}
                </button>
              )}
              {ie ? <input ref={editRef} defaultValue={editInit} onBlur={ce} onKeyDown={e => { if (e.key === "Enter") ce(); }} className="w-full text-sm border-b border-blue-400 outline-none bg-transparent" autoFocus />
                : <div onClick={() => se(s.id, s.t)} className={"text-sm cursor-text leading-snug flex-1 " + (s.dn ? "line-through text-gray-400" : "text-gray-800")}>{s.t}</div>}
              {hasSub && <span className="text-gray-300 flex-shrink-0" style={{ fontSize: 9 }}>{subDone}/{subTotal}</span>}
            </div>
            {cx && qd && <div className="flex items-center gap-1 mt-0.5 ml-4"><span className="w-1.5 h-1.5 rounded-full inline-block" style={{ background: qd.color }} /><span className="text-gray-400 truncate" style={{ fontSize: 10 }}>{tasks.find(b => b.id === bI)?.title}</span></div>}
          </div>
          <div className="flex items-center gap-1 flex-shrink-0 opacity-0 group-hover:opacity-100" style={{ transition: "opacity .15s" }}>
            <select value={s.d} onChange={e => chd(bI, mI, s.id, +e.target.value)} style={{ fontSize: 10 }} className="bg-gray-100 rounded px-1 py-0.5 border-0 outline-none">
              <option value={0}>毎日</option>
              {Array.from({ length: 30 }, (_, i) => i + 1).map(n => <option key={n} value={n}>{dl(n)}</option>)}
            </select>
            <button onClick={() => di(s.id)} className="text-red-400 hover:text-red-600 text-xs px-1">✕</button>
          </div>
        </div>

        {/* Sub-tasks (short tasks) */}
        {isOpen && (
          <div className="ml-8 pl-3 border-l-2 border-gray-100 mb-1">
            {(s.sub || []).map(sub => (
              <div key={sub.id} className="group flex items-center gap-2 py-1 px-1 rounded hover:bg-gray-50">
                <button onClick={() => tglSub(bI, mI, s.id, sub.id)} className="flex-shrink-0">
                  <div className={"w-3 h-3 rounded-sm border flex items-center justify-center " + (sub.dn ? "bg-green-400 border-green-400" : "border-gray-300")} style={{ borderWidth: 1.5 }}>
                    {sub.dn && <svg width="8" height="8" viewBox="0 0 10 10"><path d="M2 5L4 7L8 3" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none" /></svg>}
                  </div>
                </button>
                {editId === sub.id ? (
                  <input ref={editRef} defaultValue={editInit}
                    onBlur={() => { editSub(bI, mI, s.id, sub.id); setEditId(null); }}
                    onKeyDown={e => { if (e.key === "Enter") { editSub(bI, mI, s.id, sub.id); setEditId(null); } }}
                    className="flex-1 bg-transparent outline-none border-b border-blue-300" style={{ fontSize: 12 }} autoFocus />
                ) : (
                  <span onClick={() => se(sub.id, sub.t)} className={"flex-1 cursor-text " + (sub.dn ? "line-through text-gray-400" : "text-gray-600")} style={{ fontSize: 12 }}>{sub.t}</span>
                )}
                <button onClick={() => delSub(bI, mI, s.id, sub.id)} className="text-red-300 hover:text-red-500 opacity-0 group-hover:opacity-100" style={{ fontSize: 10, transition: "opacity .15s" }}>✕</button>
              </div>
            ))}
            {/* Add sub-task */}
            {addTarget === "sub_" + s.id ? (
              <div className="flex items-center gap-1.5 py-1 px-1">
                <span className="text-gray-300" style={{ fontSize: 10 }}>•</span>
                <input ref={addRef} defaultValue=""
                  onKeyDown={e => { if (e.key === "Enter") addSub(bI, mI, s.id); if (e.key === "Escape") { setAddTarget(null); } }}
                  placeholder="ショートタスクを追加..." className="flex-1 bg-transparent outline-none border-b border-blue-200" style={{ fontSize: 12 }} autoFocus />
                <button onClick={() => addSub(bI, mI, s.id)} className="text-blue-500" style={{ fontSize: 10 }}>追加</button>
                <button onClick={() => { setAddTarget(null); }} className="text-gray-400" style={{ fontSize: 10 }}>✕</button>
              </div>
            ) : (
              <button onClick={() => { setAddTarget("sub_" + s.id); setAddVal(""); }} className="text-gray-300 hover:text-blue-500 py-0.5 px-1" style={{ fontSize: 10 }}>＋ ショートタスク</button>
            )}
          </div>
        )}
      </div>
    );
  }

  function renderAF({ tgt, fn, sd, sq }) {
    if (addTarget !== tgt) return null;
    return (
      <div className="flex items-center gap-1.5 py-1.5 px-2 bg-blue-50 rounded-lg mt-1">
        <input ref={addRef} defaultValue="" onKeyDown={e => { if (e.key === "Enter") fn(); if (e.key === "Escape") { setAddTarget(null); } }} placeholder="タスク名..." className="flex-1 text-sm bg-transparent outline-none border-b border-blue-300" autoFocus />
        {sd && <select value={addDay} onChange={e => setAddDay(+e.target.value)} style={{ fontSize: 10 }} className="bg-white rounded px-1 py-0.5"><option value={0}>毎日</option>{Array.from({ length: 30 }, (_, i) => i + 1).map(n => <option key={n} value={n}>{dl(n)}</option>)}</select>}
        {sq && <select value={addQ} onChange={e => setAddQ(e.target.value)} style={{ fontSize: 10 }} className="bg-white rounded px-1 py-0.5">{Object.entries(QS).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}</select>}
        <button onClick={fn} className="text-xs bg-blue-500 text-white px-2 py-0.5 rounded">追加</button>
        <button onClick={() => { setAddTarget(null); }} className="text-xs text-gray-400">✕</button>
      </div>
    );
  }

  function PV() {
    return (
      <div className="space-y-3">
        {Object.entries(QS).map(([qk, q]) => {
          const qt = tasks.filter(b => b.q === qk);
          if (!qt.length) return null;
          return (
            <div key={qk} className="rounded-xl overflow-hidden" style={{ border: "1.5px solid " + q.border }}>
              <div className="px-3 py-2 flex items-center gap-2" style={{ background: q.bg }}><span>{q.icon}</span><span className="text-xs font-bold" style={{ color: q.color }}>{q.label}</span><span className="text-gray-500" style={{ fontSize: 10 }}>{q.sub}</span></div>
              <div className="bg-white">
                {qt.map(big => {
                  const bs = getSmalls([big]); const bd = bs.filter(x => x.dn).length;
                  return (
                    <div key={big.id} className="border-t" style={{ borderColor: q.border + "66" }}>
                      <div className="flex items-center gap-2 px-3 py-2">
                        {editId === big.id ? <input ref={editRef} defaultValue={editInit} onBlur={ce} onKeyDown={e => { if (e.key === "Enter") ce(); }} className="flex-1 text-sm font-semibold border-b border-blue-400 outline-none" autoFocus />
                          : <div className="flex-1 text-sm font-semibold text-gray-900 cursor-text" onClick={() => se(big.id, big.title)}>{big.title}</div>}
                        <div className="flex items-center gap-1.5 flex-shrink-0">
                          <div className="w-12 h-1.5 bg-gray-100 rounded-full overflow-hidden"><div className="h-full rounded-full" style={{ width: (bs.length ? (bd / bs.length) * 100 : 0) + "%", background: q.color }} /></div>
                          <span className="text-gray-400 tabular-nums" style={{ fontSize: 10 }}>{bd}/{bs.length}</span>
                          <button onClick={() => di(big.id)} className="text-red-300 hover:text-red-500 text-xs ml-1">✕</button>
                        </div>
                      </div>
                      {(big.ch || []).map(mid => (
                        <div key={mid.id} className="ml-4 border-l-2 mb-1" style={{ borderColor: q.border }}>
                          <div className="flex items-center gap-1 px-2 py-1">
                            {editId === mid.id ? <input ref={editRef} defaultValue={editInit} onBlur={ce} onKeyDown={e => { if (e.key === "Enter") ce(); }} className="flex-1 text-xs font-medium border-b border-blue-400 outline-none" autoFocus />
                              : <span className="flex-1 text-xs font-medium cursor-text" style={{ color: q.color }} onClick={() => se(mid.id, mid.title)}>{mid.title}</span>}
                            <button onClick={() => { setAddTarget("s_" + big.id + "_" + mid.id); setAddVal(""); setAddDay(1); }} className="text-gray-400 hover:text-blue-500" style={{ fontSize: 10 }}>＋小</button>
                            <button onClick={() => di(mid.id)} className="text-red-300 hover:text-red-500 ml-1" style={{ fontSize: 10 }}>✕</button>
                          </div>
                          <div className="ml-1">
                            {(mid.ch || []).map(s => renderSR({key: s.id, s, bI: big.id, mI: mid.id}))}
                            {renderAF({tgt: "s_" + big.id + "_" + mid.id, fn: () => addSmall(big.id, mid.id), sd: true})}
                          </div>
                        </div>
                      ))}
                      <div className="ml-4 px-2 pb-2">
                        <button onClick={() => { setAddTarget("m_" + big.id); setAddVal(""); }} className="text-gray-400 hover:text-blue-500" style={{ fontSize: 10 }}>＋ 中タスク追加</button>
                        {renderAF({tgt: "m_" + big.id, fn: () => addMid(big.id)})}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
        <button onClick={() => { setAddTarget("big"); setAddVal(""); setAddQ("q1"); }} className="w-full py-2 border-2 border-dashed border-gray-300 rounded-xl text-sm text-gray-400 hover:border-blue-400 hover:text-blue-500">＋ 大タスク追加</button>
        {renderAF({tgt: "big", fn: addBig, sq: true})}
      </div>
    );
  }

  function DV() {
    const mx = Math.max(...allS.map(s => s.d).filter(x => x > 0), 1);
    const days = Array.from({ length: Math.min(mx + 2, 30) }, (_, i) => i + 1);
    const dT = allS.filter(s => s.d === selDay);
    const dlT = allS.filter(s => s.d === 0 && !s.dn);
    const du = dT.filter(s => !s.dn).length, dd = dT.filter(s => s.dn).length;
    return (
      <div className="space-y-3">
        <div className="bg-white rounded-xl p-3 shadow-sm border border-gray-100">
          <div className="text-gray-500 mb-1.5" style={{ fontSize: 10 }}>Day 1 = 3/5(木) 18時〜｜稼働 8:00-22:00</div>
          <div className="flex flex-wrap gap-1">{days.map(n => { const cnt = allS.filter(s => s.d === n && !s.dn).length; return (<button key={n} onClick={() => setSelDay(n)} className={"relative rounded-lg font-medium transition " + (selDay === n ? "bg-gray-900 text-white shadow" : cnt > 0 ? "bg-white text-gray-700 border border-gray-200" : "bg-gray-50 text-gray-300")} style={{ width: 48, height: 32, fontSize: 10 }}>{dl(n)}{cnt > 0 && selDay !== n && <span className="absolute -top-1 -right-1 w-3.5 h-3.5 bg-red-500 text-white rounded-full flex items-center justify-center" style={{ fontSize: 7 }}>{cnt}</span>}</button>); })}</div>
        </div>
        <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
          <div className="px-3 py-2 border-b border-gray-100"><span className="font-bold text-sm text-gray-900">{dl(selDay)}</span><span className="text-xs text-gray-400 ml-2">{du}件残り</span>{dd > 0 && <span className="text-xs text-green-500 ml-1">✓{dd}</span>}</div>
          {dT.length === 0 ? <div className="px-3 py-6 text-center text-sm text-gray-400">この日のタスクなし</div> : (
            <div>{dT.map(s => { const b = tasks.find(x => x.id === s.bId); const m = b?.ch?.find(x => x.ch?.some(y => y.id === s.id)); return renderSR({key: s.id, s, bI: s.bId, mI: m?.id, cx: true}); })}</div>
          )}
        </div>
        {dlT.length > 0 && (
          <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div className="px-3 py-2 border-b border-gray-100"><span className="font-bold text-sm text-gray-900">🔄 毎日やること</span><span className="text-xs text-gray-400 ml-2">{dlT.length}件</span></div>
            <div>{dlT.map(s => { const b = tasks.find(x => x.id === s.bId); const m = b?.ch?.find(x => x.ch?.some(y => y.id === s.id)); return renderSR({key: s.id, s, bI: s.bId, mI: m?.id, cx: true}); })}</div>
          </div>
        )}
      </div>
    );
  }

  return (
    <div className="min-h-screen p-3 max-w-2xl mx-auto" style={{ background: "#FAFAF8", fontFamily: "'Helvetica Neue','Hiragino Sans',sans-serif" }}>
      <div className="mb-4">
        <div className="flex items-center justify-between"><h1 className="text-lg font-bold text-gray-900">Task Flow</h1><button onClick={doReset} className="text-gray-400 hover:text-red-500 border border-gray-200 rounded px-2 py-0.5" style={{ fontSize: 10 }}>リセット</button></div>
        <div className="flex items-center gap-3 mt-1.5"><div className="flex-1 h-1.5 bg-gray-100 rounded-full overflow-hidden"><div className="h-full bg-gray-900 rounded-full" style={{ width: (tot ? (dn / tot) * 100 : 0) + "%" }} /></div><span className="text-gray-500 tabular-nums" style={{ fontSize: 10 }}>{dn}/{tot} 完了</span></div>
      </div>
      <div className="flex gap-1 p-0.5 bg-gray-100 rounded-lg mb-4">
        <button onClick={() => setView("daily")} className={"flex-1 py-1.5 text-xs font-medium rounded-md " + (view === "daily" ? "bg-white text-gray-900 shadow-sm" : "text-gray-500")}>📅 今日やること</button>
        <button onClick={() => setView("priority")} className={"flex-1 py-1.5 text-xs font-medium rounded-md " + (view === "priority" ? "bg-white text-gray-900 shadow-sm" : "text-gray-500")}>🔥 優先度別</button>
      </div>
      {view === "priority" ? <PV /> : <DV />}
      <div className="mt-5 bg-white rounded-xl p-3 shadow-sm border border-gray-100">
        <div className="text-gray-500 mb-1.5" style={{ fontSize: 10 }}>タスクの左▶を押すとショートタスクを追加・確認できます</div>
        <div className="grid grid-cols-2 gap-1.5">{Object.entries(QS).map(([k, q]) => (<div key={k} className="flex items-center gap-1.5"><span className="text-sm">{q.icon}</span><span className="font-medium" style={{ fontSize: 10, color: q.color }}>{q.label}</span><span className="text-gray-400" style={{ fontSize: 10 }}>{q.sub}</span></div>))}</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
